name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}   # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --split-per-abi
        # --split-per-abi keeps each APK small (arm64, armeabi-v7a, x86_64)
        # instead of one bloated universal APK. Drop the flag if you want
        # a single universal file.

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
