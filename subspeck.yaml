name: bg_remover
description: On-device background removal for images, no quality loss.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  google_mlkit_selfie_segmentation: ^0.10.0
  image: ^4.2.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
